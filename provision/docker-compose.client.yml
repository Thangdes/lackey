services:
  # Database
  postgres:
    image: postgres:14
    container_name: cvf-postgres-clientstack
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - cvf_postgres_data:/var/lib/postgresql/data
    env_file:
      - .env.docker

  # Cache
  redis:
    image: redis:6-alpine
    container_name: cvf-redis-clientstack
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - cvf_redis_data:/data

  # Next.js client (standalone)
  client:
    build:
      context: ../cvf-client
      dockerfile: Dockerfile
    environment:
      # Server-side requests from Next.js should hit the Nest server container directly
      - NEXT_INTERNAL_API_BASE=http://server:8000
      # Public browser requests should go through Nginx at /api/v1
      - NEXT_PUBLIC_API_BASE=/api/v1
    expose:
      - "3000"
    depends_on:
      - server
    restart: unless-stopped

  # NestJS server
  server:
    build:
      context: ../cvf-server
      dockerfile: Dockerfile
    command: >
      sh -c "npx prisma migrate deploy && node dist/main.js"
    depends_on:
      - postgres
      - redis
    expose:
      - "8000"
    restart: unless-stopped

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      # Mount nginx.conf as the default server config
      - ../cvf-client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server
    restart: unless-stopped

networks:
  default:
    name: cvf_net
    driver: bridge

volumes:
  cvf_postgres_data:
  cvf_redis_data: