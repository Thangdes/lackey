services:
  # Database
  mongo:
    image: mongo:7
    container_name: cvf-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - cvf_mongo_data:/data/db
    env_file:
      - .env

  # Cache
  redis:
    image: redis:6-alpine
    container_name: cvf-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - cvf_redis_data:/data

  # Next.js client (standalone)
  client:
    build:
      context: ../client
      dockerfile: Dockerfile
    env_file:
      # Load base env then override with Docker-specific client env
      - ../client/.env
    expose:
      - "3000"
    depends_on:
      - server
    restart: unless-stopped

  # NestJS server
  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    depends_on:
      - mongo
      - redis
    ports:
      - "8000:8000"
    expose:
      - "8000"
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      # Mount nginx.conf as the default server config
      - ../client/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server
    restart: unless-stopped

networks:
  default:
    name: cvf_net
    driver: bridge

volumes:
  cvf_mongo_data:
  cvf_redis_data:
