services:
  postgres:
    image: postgres:14
    container_name: cvf-postgres
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - cvf_postgres_data:/var/lib/postgresql/data
    env_file:
      - .env.docker

  redis:
    image: redis:6-alpine
    container_name: cvf-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - cvf_redis_data:/data

  app:
    container_name: cvf-app
    build:
      context: ../cvf-server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
      - .env
    depends_on:
      - postgres
      - redis

volumes:
  cvf_postgres_data:
  cvf_redis_data:
